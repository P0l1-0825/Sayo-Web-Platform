# ============================================================
# SAYO — Deploy: Static Export to GitHub Pages
# ============================================================
# Automatically deploys on push to main.
# Replaces manual `npm run deploy` command.
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://sayo-api-gateway.direccion-2ac.workers.dev"
          NEXT_PUBLIC_SUPABASE_URL: "https://vezeukmgezhddcryobee.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlemV1a21nZXpoZGRjcnlvYmVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTA1ODYsImV4cCI6MjA4OTkyNjU4Nn0.LB3e5lSzwdKP0k6cKYvXVU9aYYKwSiOTB2VSkTYYVZ8"
          NEXT_PUBLIC_DEMO_MODE: "false"
          DEPLOY_TARGET: "github-pages"

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
